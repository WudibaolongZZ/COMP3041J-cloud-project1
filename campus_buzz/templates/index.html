<body>
    <div class="page-shell">
        <header class="hero">
            <h1>Campus Buzz</h1>
            <p>Submit your campus events</p>
        </header>

        <main class="content">
            <section class="card">
                <h2>Submit Event</h2>
                <form action="/submit" method="post" class="event-form">
                    <label>Title
                        <input type="text" name="title" placeholder="Event title" required />
                    </label>

                    <label>Description
                        <textarea name="description" rows="5" placeholder="Please provide a description of no less than 40 words"></textarea>
                    </label>

                    <div class="field-row">
                        <label>Location
                            <input type="text" name="location" placeholder="E.g. Library" />
                        </label>
                        <label>Date
                            <input type="text" name="date" placeholder="YYYY-MM-DD" required />
<!--                            <input type="date" name="date" required>-->

<!--                                   name="date"-->
<!--                                   placeholder="YYYY-MM-DD"-->
<!--                                   required>-->

<!--                            <small style="color: #666;">Required Format: YYYY-MM-DD</small>-->
                        </label>
                    </div>

                    <label>Organiser
                        <input type="text" name="organiser" placeholder="Your name or group" />
                    </label>

                    <button type="submit" class="btn">Submit</button>
                </form>
            </section>

        </main>
    </div>
</body>
